name: agriops_env
version: "1.0.0"
description: >
  AgriOpsEnv is an OpenEnv benchmark for agricultural operations and
  decision-making across crop selection, field diagnosis, and constrained
  seasonal farm planning.
author: databaes
tasks:
  - name: easy
    description: "Crop selection under field constraints."
    max_steps: 2
  - name: medium
    description: "Diagnose field issue and recommend intervention."
    max_steps: 5
  - name: hard
    description: "Seasonal farm planning under water, fertilizer, and budget limits."
    max_steps: 6
